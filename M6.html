<script>
    // 게임 데이터 (단순화된 워드풀)
    const sentences = [
 '가끔 크러쉬', '강남스타일 싸이', '고민중독 큐더블유이알', '그대라는 시 태연', '그때 그 아이들은 악동뮤지션', '금요일에 만나요 아이유', '기억을 걷는 시간 넬', '나의 옛날 이야기 아이유', '낙하 악동뮤지션 아이유', '내 편 되죠 크러쉬', '너랑 나 아이유', '넌 크러쉬', '눈부신 밤 라포엠', '눈이 마주친 순간 크러쉬', '다이너마이트 방탄소년단', '다이스 온유', '돈트 비 샤이 크러쉬', '동네 온유', '드라마 에스파', '또각또각 온유', '뚜두뚜두 블랙핑크', '라라라 악동뮤지션', '러브다이브 아이브', '러브포엠 아이유', '러빙 미 피프티피프티', '루팡 카라', '리벨 하트 아이브', '마그네틱 아일릿', '마인 아이브', '멜로디 악동뮤지션', '무릎 아이유', '뭐가 보여 크러쉬', '미스터 카라', '바비 드림스 피프티피프티', '밤과 별의 노래 온유 이진아', '밤편지 아이유', '버블검 뉴진스', '버터 방탄소년단', '보라빛 향기 강수지', '봄 사랑 벚꽃 말고 하이포 아이유', '블루 온유', '블루밍 아이유', '비밀의 화원 아이유', '빈센조 드라마 주제곡 라포엠', '사랑의 노래 라포엠', '사랑이 잘 아이유', '사랑이 잘 아이유 오혁', '사랑이었을까 온유', '슈퍼 샤이 뉴진스', '슈퍼내추럴 뉴진스', '슈퍼노바 에스파', '스물셋 아이유', '스위치 아이브', '스타리 나잇 피프티피프티', '스티브 원더러스트 크러쉬', '스프링데이 방탄소년단', '시리얼 크러쉬', '쏘핫 원더걸스', '아마겟돈 에스파', '아웃사이드 크러쉬', '아이 엠 아이브', '아이들 블랙핑크', '아파트 로제 브루노마스', '애니멀 온유', '애프터 라이크 아이브', '양화대교 자이언티', '어떤 사이 온유', '어떻게 지내 크러쉬', '에잇 아이유', '엔돌핀 크러쉬', '예뻤어 데이식스', '오랜 날 오랜 밤 악동뮤지션', '오아시스 크러쉬', '온유하게 해요 온유', '왈츠 인 스톰 라포엠', '우아해 크러쉬', '위플래시 에스파', '유 앤 아이 크러쉬', '이타 뉴진스', '인 유어 아이즈 온유', '일레븐 아이브', '잊어버리지마 크러쉬', '잊을만하면 크러쉬', '잔소리 아이유', '잠 못드는 밤 크러쉬', '젠틀맨 싸이', '좋은 날 아이유', '집에 돌아오는 길 악동뮤지션', '첫사랑 에피톤 프로젝트', '큐피드 피프티피프티', '크러쉬 온 유 크러쉬', '크레이지 르세라핌', '킬디스러브 블랙핑크', '텔 미 피프티피프티', '텔미유러브미 원더걸스', '팔레트 아이유 지드래곤', '퍼센트 온유', '퍼펙트 심포니 라포엠', '프라이데이야 크러쉬', '플롯 트위스트 투어스', '하루 끝 아이유', '하우 스위트 뉴진스', '하이어 피프티피프티', '한 페이지가 될 수 있게 데이식스', '해야 아이브', '향수 크러쉬', '허그 미 크러쉬',
     ];

    const consonants = ['ㄱ', 'ㄴ', 'ㄷ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅅ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

    let currentSentence = '';
    let guessedConsonants = new Set();
    let wrongConsonants = new Set();
    let gameWon = false;
    let gameLost = false;
    const maxWrongAttempts = 4;
    let charStates = [];

    // 셔플된 문장 리스트와 인덱스
    let shuffledSentences = [];
    let sentenceIndex = 0;

    function shuffleSentences() {
        shuffledSentences = [...sentences];
        for (let i = shuffledSentences.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledSentences[i], shuffledSentences[j]] = [shuffledSentences[j], shuffledSentences[i]];
        }
        sentenceIndex = 0;
    }

    function getNextSentence() {
        if (sentenceIndex >= shuffledSentences.length) {
            shuffleSentences();
        }
        return shuffledSentences[sentenceIndex++];
    }

    // 겹받침 처리를 위한 개선된 함수
    function getComplexConsonantComponents(consonant) {
        const complexConsonantMap = {
            'ㄳ': ['ㄱ', 'ㅅ'], 'ㄵ': ['ㄴ', 'ㅈ'], 'ㄶ': ['ㄴ', 'ㅎ'],
            'ㄺ': ['ㄹ', 'ㄱ'], 'ㄻ': ['ㄹ', 'ㅁ'], 'ㄼ': ['ㄹ', 'ㅂ'],
            'ㄽ': ['ㄹ', 'ㅅ'], 'ㄾ': ['ㄹ', 'ㅌ'], 'ㄿ': ['ㄹ', 'ㅍ'],
            'ㅀ': ['ㄹ', 'ㅎ'], 'ㅄ': ['ㅂ', 'ㅅ']
        };
        return complexConsonantMap[consonant] || null;
    }

    function containsConsonant(targetChar, consonant) {
        const consonantMap = {
            'ㄲ': 'ㄱ', 'ㄸ': 'ㄷ', 'ㅃ': 'ㅂ', 'ㅆ': 'ㅅ', 'ㅉ': 'ㅈ'
        };
        
        if (targetChar === consonant) return true;
        if (consonantMap[targetChar] === consonant) return true;
        
        const components = getComplexConsonantComponents(targetChar);
        if (components && components.includes(consonant)) return true;
        
        return false;
    }

    function decomposeHangul(char) {
        const code = char.charCodeAt(0) - 0xAC00;
        if (code < 0 || code > 11171) return null;
        const jong = code % 28;
        const jung = (code - jong) / 28 % 21;
        const cho = ((code - jong) / 28 - jung) / 21;
        const choTable = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const jungTable = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
        const jongTable = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        return {
            cho: choTable[cho],
            jung: jungTable[jung],
            jong: jong === 0 ? '' : jongTable[jong]
        };
    }

    function composeHangul(cho, jung, jong = '') {
        const choTable = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const jungTable = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
        const jongTable = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const choIndex = choTable.indexOf(cho);
        const jungIndex = jungTable.indexOf(jung);
        const jongIndex = jongTable.indexOf(jong);
        if (choIndex === -1 || jungIndex === -1 || jongIndex === -1) return null;
        const code = 0xAC00 + (choIndex * 21 + jungIndex) * 28 + jongIndex;
        return String.fromCharCode(code);
    }

    // 종성이 완전히 맞춰졌는지 확인하는 개선된 함수
    function isJongComplete(charData) {
        if (!charData.jong) return true; // 종성이 없으면 완료
        
        // 쌍받침 처리 (ㄲ, ㅆ)
        const doubleConsonantMap = {
            'ㄲ': 'ㄱ', 'ㅆ': 'ㅅ'
        };
        
        if (doubleConsonantMap[charData.jong]) {
            // 쌍받침: 기본 자음이 맞춰지면 완료
            const baseConsonant = doubleConsonantMap[charData.jong];
            return charData.foundJongComponents.has(baseConsonant) || charData.foundJongComponents.has(charData.jong);
        }
        
        const components = getComplexConsonantComponents(charData.jong);
        if (!components) {
            // 단순 종성: 하나만 맞추면 됨
            return charData.foundJongComponents.has(charData.jong);
        } else {
            // 겹받침: 모든 구성 요소가 맞춰져야 함
            return components.every(comp => charData.foundJongComponents.has(comp));
        }
    }

    function isCharComplete(charData) {
        return charData.choFound && isJongComplete(charData);
    }

    function createConsonantButtons() {
        const grid = document.getElementById('consonantGrid');
        grid.innerHTML = '';
        consonants.forEach(consonant => {
            const button = document.createElement('button');
            button.className = 'consonant-btn available';
            button.textContent = consonant;
            button.onclick = () => handleConsonantClick(consonant);
            button.id = `btn-${consonant}`;
            grid.appendChild(button);
        });
    }

    function showAnswer() {
        const words = [];
        let currentWord = [];

        charStates.forEach(charData => {
            if (charData.isSpace) {
                if (currentWord.length > 0) {
                    words.push(currentWord);
                    currentWord = [];
                }
            } else {
                currentWord.push(`<span class="hangul-char complete-char">${charData.char}</span>`);
            }
        });

        if (currentWord.length > 0) {
            words.push(currentWord);
        }

        const wordGroups = words.map(word => 
            `<span class="word-group">${word.join('')}</span>`
        );

        document.getElementById('sentenceArea').innerHTML = wordGroups.join('');
    }

    // 종성 표시를 위한 개선된 함수
    function getDisplayJong(charData) {
        if (!charData.jong) return '';
        
        // 쌍받침 처리 (ㄲ, ㅆ)
        const doubleConsonantMap = {
            'ㄲ': 'ㄱ', 'ㅆ': 'ㅅ'
        };
        
        if (doubleConsonantMap[charData.jong]) {
            const baseConsonant = doubleConsonantMap[charData.jong];
            if (charData.foundJongComponents.has(baseConsonant) || charData.foundJongComponents.has(charData.jong)) {
                return charData.jong; // 쌍받침 전체 표시
            }
            return '';
        }
        
        const components = getComplexConsonantComponents(charData.jong);
        if (!components) {
            // 단순 종성
            return charData.foundJongComponents.has(charData.jong) ? charData.jong : '';
        } else {
            // 겹받침: 찾은 구성 요소만 표시
            const foundComponents = components.filter(comp => charData.foundJongComponents.has(comp));
            if (foundComponents.length === 0) return '';
            if (foundComponents.length === components.length) return charData.jong; // 모두 찾음
            
            // 일부만 찾은 경우: 찾은 구성 요소들만 표시
            return foundComponents.join('');
        }
    }

    function updateDisplay() {
        const words = [];
        let currentWord = [];

        charStates.forEach(charData => {
            if (charData.isSpace) {
                if (currentWord.length > 0) {
                    words.push(currentWord);
                    currentWord = [];
                }
            } else {
                if (charData.isNonHangul) {
                    currentWord.push(`<span class="hangul-char complete-char">${charData.char}</span>`);
                } else {
                    let displayCho = charData.choFound ? charData.cho : '';
                    let displayJung = charData.jung;
                    let displayJong = getDisplayJong(charData);

                    if (displayCho && displayJong && isJongComplete(charData)) {
                        currentWord.push(`<span class="hangul-char complete-char">${composeHangul(displayCho, displayJung, displayJong)}</span>`);
                    } else if (displayCho && !charData.jong) {
                        currentWord.push(`<span class="hangul-char complete-char">${composeHangul(displayCho, displayJung)}</span>`);
                    } else if (displayCho) {
                        if (displayJong) {
                            // 초성 있고 종성 일부만 맞춤
                            currentWord.push(`<span class="hangul-char incomplete-char">${composeHangul(displayCho, displayJung, displayJong)}</span>`);
                        } else {
                            // 초성만 있음
                            currentWord.push(`<span class="hangul-char incomplete-char">${composeHangul(displayCho, displayJung)}</span>`);
                        }
                    } else if (displayJong) {
                        // 종성만 있음 (초성 없음)
                        currentWord.push(`<span class="hangul-char incomplete-char" style="position: relative; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; min-width: 1em; height: 1.2em;"><span style="font-size: 0.8em;">${displayJung}</span><span style="font-size: 0.7em; margin-top: -0.1em;">${displayJong}</span></span>`);
                    } else {
                        // 모음만 있음
                        currentWord.push(`<span class="hangul-char incomplete-char">${displayJung}</span>`);
                    }
                }
            }
        });

        if (currentWord.length > 0) {
            words.push(currentWord);
        }

        const wordGroups = words.map(word => 
            `<span class="word-group">${word.join('')}</span>`
        );

        document.getElementById('sentenceArea').innerHTML = wordGroups.join('');
    }

    function handleConsonantClick(consonant) {
        if (guessedConsonants.has(consonant) || wrongConsonants.has(consonant) || gameWon || gameLost) return;

        let found = false;
        charStates.forEach(charData => {
            if (charData.isSpace || charData.isNonHangul) return;
            
            // 초성 처리
            if (!charData.choFound && containsConsonant(charData.cho, consonant)) {
                charData.choFound = true;
                found = true;
            }
            
            // 종성 처리 - 개선된 로직
            if (charData.jong && containsConsonant(charData.jong, consonant)) {
                charData.foundJongComponents.add(consonant);
                
                // 쌍받침의 경우 기본 자음을 맞췄을 때 쌍받침도 추가
                const doubleConsonantReverse = {
                    'ㄱ': 'ㄲ', 'ㅅ': 'ㅆ'
                };
                if (doubleConsonantReverse[consonant] === charData.jong) {
                    charData.foundJongComponents.add(charData.jong);
                }
                
                found = true;
            }
        });

        if (found) {
            guessedConsonants.add(consonant);
            document.getElementById(`btn-${consonant}`).className = 'consonant-btn correct';
            updateDisplay();
            const allComplete = charStates.every(charData =>
                charData.isSpace || charData.isNonHangul || isCharComplete(charData)
            );
            if (allComplete) {
                gameWon = true;
                document.getElementById('winMessage').style.display = 'block';
            }
        } else {
            wrongConsonants.add(consonant);
            document.getElementById(`btn-${consonant}`).className = 'consonant-btn wrong';
            if (wrongConsonants.size >= maxWrongAttempts) {
                gameLost = true;
                document.getElementById('loseMessage').style.display = 'block';
                showAnswer();
            }
        }

        updateStats();
    }

    function updateStats() {
        document.getElementById('gameStats').innerHTML =
            `맞춘 자음: ${guessedConsonants.size}개 | 틀린 자음: ${wrongConsonants.size}개`;
    }

    function startNewGame() {
        currentSentence = getNextSentence();
        guessedConsonants = new Set();
        wrongConsonants = new Set();
        gameWon = false;
        gameLost = false;
        charStates = [];
        document.getElementById('winMessage').style.display = 'none';
        document.getElementById('loseMessage').style.display = 'none';

        for (let char of currentSentence) {
            if (char === ' ') {
                charStates.push({ isSpace: true });
            } else {
                const decomposed = decomposeHangul(char);
                if (!decomposed) {
                    charStates.push({ isNonHangul: true, char });
                } else {
                    charStates.push({
                        char,
                        cho: decomposed.cho,
                        jung: decomposed.jung,
                        jong: decomposed.jong,
                        choFound: false,
                        foundJongComponents: new Set(), // 종성 구성 요소들을 저장
                        isSpace: false,
                        isNonHangul: false
                    });
                }
            }
        }

        updateDisplay();
        createConsonantButtons();
        updateStats();
    }

    window.onload = function () {
        createConsonantButtons();
        shuffleSentences();
        startNewGame();
    };
</script>
