<style>
  * {

    body {
      font-family: Arial, sans-serif;
      background: #209087;
      text-align: center;
      padding: 30px;
      margin: 0;
    }

  h1 { font-size: 3em; margin-bottom:0; color: #EF0; }
  h2 { font-size:1.2em; color: #EF0; }

  header > div {
    color:#fff;
    line-height: 140%;
    margin:30px auto;
  }
    header > div {
      color: #fff;
      line-height: 140%;
      margin: 30px auto;
    }

    header {
      min-height: 380px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 0;
      color: #EF0;;
    }

    h2 {
      font-size: 1.2em;
      color: white;
    }

    .game_container {
      background-color: #0E756D;
      color: #fff;
      width: 90%;
    max-width:800px;      
   margin: auto;
      padding: 20px;
      border-radius: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .game-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .game-buttons button {
      width: 200px;
      height: 52px;
      padding: 16px 0;
      font-size: 1.1em;
      cursor: pointer;
      border: none;
      background-color: #CFF9FF;
      color: #0A6A79;
      border-radius: 12px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      margin: 5px;
    }

    .game-buttons button:hover {
      background-color: #1baf8f;
      color: #fff;
    }

.square-button {
            width: 250px;
            height: 45px;
            background-color: #FFB3D9; /* 연분홍 */
            color: white;
            border: none;
            border-radius: 12px; /* 둥근 모서리 */
            cursor: pointer;
            font-size: 1.1rem; /*크기 고정 */
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.2;
            margin: 8px;
            transition: all 0.3s ease;
            font-family: Arial, sans-serif;
        }

    .square-button:hover {
        background-color: #FF8FAB; /* 호버 시 진한 분홍 */
        transform: scale(1.05);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .square-button:active {
        transform: scale(0.95);
    }

    .credits {
      font-size: 0.8em;
      margin-top: 40px;
      color: #e3e3e3;
      max-width: 250px;
      margin: 40px auto;
      line-height: 1.5;
    }

    /* 반응형 레이아웃 */
    @media (min-width: 800px) {
      .game-buttons button {
        flex: 0 0 calc(33.333% - 20px); /* 3줄 */
        max-width: 200px;
      }
    }

    @media (max-width: 799px) and (min-width: 500px) {
      .game-buttons button {
        flex: 0 0 calc(50% - 20px); /* 2줄 */
        max-width: 200px;
      }
    }

    @media (max-width: 499px) {
      .game-buttons button {
        flex: 0 0 calc(100% - 20px); /* 1줄 */
        max-width: 280px;
      }
      
      .game_container {
        width: 95%;
      }
    }

</style>
